# Hat Tips go to:
#	* http://blog.hawkhost.com/2010/07/02/tmux-%E2%80%93-the-terminal-multiplexer-part-2/
#	* http://tmux.svn.sourceforge.net/viewvc/tmux/trunk/examples/screen-keys.conf?revision=2562

set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID"

# Handle Ghostty terminal
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # colored underlines

# Act (mostly) like screen!
###########################################################
# Use Ctrl+a instead of Ctrl+b
unbind C-b
set-option -g prefix C-a
bind a send-prefix

bind c new-window -c "#{pane_current_path}"



# next/prev (n and p are tmux defaults)
unbind n
bind n next-window
unbind p
bind p previous-window

# other ^A
unbind ^A
bind ^A last-window



set -g base-index 1
set -g pane-base-index 1
set -s escape-time 0             # No delay after Esc
set -g detach-on-destroy off     # Stay in tmux when session closes

# HELLLLLLLOOOO MOUSE
###########################################################
set-option -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
unbind -T root WheelUpStatus
unbind -T root WheelDownStatus

# Use OSC 52 for clipboard integration (works locally and over SSH)
set -g set-clipboard on

# I like vim (mostly)
###########################################################
#set -g status-keys vi
setw -g mode-keys vi

# Move like vim in panes
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# resize panes like vim
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5



# Other Changes
###########################################################

set -g history-limit 10000

# Monitor activity
setw -g monitor-activity on
set -g visual-activity off

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time
set -g status-interval 10     # redraw status line every 10 seconds



# Automatically set window title
# setw -g automatic-rename on
set-window-option -g allow-rename off
set-window-option -g automatic-rename off
set -g renumber-windows on

# Bind splits to something sane
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# tmux-file-picker
bind C-f display-popup -E "tmux-file-picker"
bind C-g display-popup -E "tmux-file-picker -g"
bind C-z display-popup -E "tmux-file-picker --zoxide"
bind C-v display-popup -E "tmux-file-picker --zoxide --dir-only"
bind C-x display-popup -E "tmux-file-picker --zoxide --git-root"

# Setup my colors and status

set -g status-bg colour236
set -g status-fg colour244

set -g status-left '#[fg=colour236,bg=colour109,bold] ❐ #S #[default] '

set -g status-right "#[fg=colour244,bg=colour236] %d %b #[fg=colour248,bg=colour239] %R #[fg=colour236,bg=colour246] #h "

set-window-option -g window-status-style fg=colour245,bg=colour236 # light gray, dark gray
set-window-option -g window-status-format " #I:#W#{?#F,#F,}"

set -g status-justify left
set-window-option -g window-status-current-style fg=colour236,bg=colour108
setw -g window-status-current-format " #[fg=colour236,bg=colour108,bold]#I:#W#{?#F,#F,}#[default]"


setw -g window-status-activity-style underscore

set -g set-titles on
#set -g set-titles-string '#T'
set -g set-titles-string '#h ❐ #S ● #I #W'


#new-session -n shell
